<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main Template</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            font-family: system-ui;
        }

        header,
        main,
        footer,
        nav {
            border: 1px solid black;
            padding: 5%;
        }

        img,
        svg {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .imgBox {
            aspect-ratio: 1 / 1;
            overflow: clip;
            border: 2px solid grey;

            display: grid;
            grid-template-areas: "main";

        }

        .imgBox>* {
            grid-area: main;
        }

        .imgBox svg {
            animation: zoom 3s;
            animation-timeline: view();
            animation-range: entry 30% exit 100%;
        }

        main {
            min-height: 500vh;

        }

        @keyframes zoom {


            from {
                transform: scale(1);

            }

            to {
                transform: scale(2.9);

            }

        }
    </style>
</head>
